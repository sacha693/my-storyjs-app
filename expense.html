<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>旅費記帳｜金童家關西旅程</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--ink:#12323a;--line:#12323a;--blue:#7fd3df;--sun:#f4c95d;--paper:#f7fdff;--mint:#d8f5ec;--red:#ffd7d7;--cream:#fff8df}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:linear-gradient(#bdeef5,#f7fdff);color:var(--ink);line-height:1.6}.wrap{max-width:1050px;margin:auto;padding:14px 14px 90px}.card{background:var(--paper);border:4px solid var(--line);border-radius:22px;padding:16px;margin:14px 0;box-shadow:5px 5px 0 rgba(18,50,58,.22)}h1,h2{line-height:1.2}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}.dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.tile{background:#fff;border:4px solid var(--line);border-radius:18px;padding:14px;box-shadow:4px 4px 0 rgba(18,50,58,.18)}.tile b{font-size:24px;display:block}label{font-weight:900;font-size:14px}input,select{width:100%;padding:11px;border:3px solid var(--line);border-radius:12px;background:#fff;font:inherit}button,.btn{display:inline-block;border:3px solid var(--line);background:var(--blue);color:var(--ink);text-decoration:none;border-radius:14px;padding:10px 13px;font-weight:900;box-shadow:3px 3px 0 var(--line);margin:5px 4px 5px 0;cursor:pointer}.sun{background:var(--sun)}.white{background:#fff}.danger{background:var(--red)}.dark{background:#12323a;color:#fff}.status{background:#fff3c6;border:3px dashed var(--line);border-radius:14px;padding:10px;font-weight:900}.note{background:#fff;border:3px dashed var(--line);border-radius:14px;padding:10px;font-weight:900}.fixed{background:var(--cream)}table{width:100%;border-collapse:collapse;background:#fff;border:4px solid var(--line);box-shadow:4px 4px 0 rgba(18,50,58,.16);margin:10px 0}th,td{border:2px solid var(--line);padding:8px;text-align:left;vertical-align:top}th{background:var(--blue)}.tag{display:inline-block;border:2px solid var(--line);border-radius:999px;padding:2px 7px;font-size:12px;font-weight:900;background:#e7fbff}.bar{height:17px;background:#fff;border:3px solid var(--line);border-radius:999px;overflow:hidden;margin:6px 0}.fill{height:100%;background:var(--blue)}.float{position:fixed;right:12px;bottom:12px;z-index:10}.small{font-size:13px;opacity:.8}.editBox{background:#fff3c6;border:4px solid var(--line);border-radius:18px;padding:12px;margin-top:10px}@media(max-width:650px){.wrap{padding:10px 10px 90px}table{font-size:13px}button,.btn{width:100%;text-align:center}.tile b{font-size:21px}}
</style>
</head>
<body>
<main class="wrap">
<section class="card">
<h1>💰 旅費記帳</h1>
<p>穩定版：不使用 PWA 快取。固定費固定顯示，現場消費同步到 Supabase。</p>
<div class="status" id="status">頁面載入中...</div>
<p><a class="btn white" href="index.html">回主頁</a><button class="dark" onclick="loadCloud()">重新同步</button><button class="sun" onclick="exportCSV()">匯出 CSV</button></p>
</section>
<section class="card">
<h2>設定</h2>
<div class="grid">
<div><label>記帳人</label><select id="member"><option value="sacha">sacha</option><option value="yang">yang</option></select></div>
<div><label>總預算 JPY</label><input id="budget" type="number" value="425000"></div>
<div><label>匯率 TWD/JPY</label><input id="rate" type="number" step="0.001" value="0.22"></div>
<div><label>日期篩選</label><select id="filter"><option value="all">全部日期</option><option>7/23</option><option>7/24</option><option>7/25</option><option>7/26</option><option>7/27</option><option>7/28</option><option>7/29</option><option>7/30</option><option>7/31</option></select></div>
</div>
</section>
<section class="dash" id="dash"></section>
<section class="card"><h2>📊 家庭統計</h2><div class="dash" id="family"></div></section>
<section class="card"><h2>固定費：訂房與機票</h2><div class="note">固定費不存進 Supabase，避免誤刪；但會列入總額與統計。</div><div id="fixedBox"></div></section>
<section class="card">
<h2>新增現場消費</h2>
<div class="grid">
<div><label>日期</label><select id="date"><option>7/23</option><option>7/24</option><option>7/25</option><option>7/26</option><option>7/27</option><option>7/28</option><option>7/29</option><option>7/30</option><option>7/31</option></select></div>
<div><label>類別</label><select id="cat"><option>餐食</option><option>交通</option><option>門票</option><option>購物</option><option>住宿</option><option>機票</option><option>便利商店</option><option>其他</option></select></div>
<div><label>項目</label><input id="item" placeholder="例如：拉麵、藥妝" oninput="autoCat()"></div>
<div><label>JPY</label><input id="jpy" type="number"></div>
<div><label>TWD</label><input id="twd" type="number"></div>
<div><label>付款方式</label><select id="pay"><option>現金</option><option>信用卡</option><option>IC卡</option><option>其他</option></select></div>
</div>
<p><button onclick="addExpense()">新增消費</button></p>
<div id="editBox"></div>
</section>
<section class="card"><h2>類別比例</h2><div id="cats"></div></section>
<section class="card"><h2>每日小計</h2><div id="daily"></div></section>
<section class="card"><h2>消費明細</h2><div id="list"></div></section>
</main>
<script>
const SUPABASE_URL='https://pdmswvntuxzlvlrvhvma.supabase.co';
const SUPABASE_KEY='sb_publishable_Zy_iMjo47uyH2kwtrApJLQ_z83oZ856';
const TRIP_ID='kansai-2026';
const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const fixed=[
{date:'7/24',cat:'住宿',item:'APA Hotel Osaka Temmabashi Ekimae｜Agoda 1715112246｜7/24-7/26',jpy:48544,twd:10680,pay:'信用卡',created_by:'固定費',fixed:true},
{date:'7/26',cat:'住宿',item:'Liber Hotel Osaka｜Trip 1616329233185585 / 8RAXG31G｜7/26-7/28',jpy:53300,twd:11970,pay:'信用卡',created_by:'固定費',fixed:true},
{date:'7/28',cat:'住宿',item:'OASIS NANIWA｜易遊網 ORD0029621149｜7/28-7/31',jpy:24345,twd:5356,pay:'信用卡',created_by:'固定費',fixed:true},
{date:'7/24',cat:'機票',item:'長榮航空 BR134 / BR177｜Trip.com 1616329870509999｜4人來回機票',jpy:204491,twd:44988,pay:'信用卡',created_by:'固定費',fixed:true}
];
let cloud=[];let editing=null;
function $(id){return document.getElementById(id)}
function esc(v){return String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function moneyY(n){return '¥'+Math.round(Number(n||0)).toLocaleString()}
function moneyT(n){return 'NT$'+Math.round(Number(n||0)).toLocaleString()}
function allRows(){return [...fixed,...cloud]}
function shown(){return allRows().filter(x=>$('filter').value==='all'||x.date===$('filter').value)}
function suggest(s){s=(s||'').toLowerCase();if(/機票|航空|長榮|br134|br177|trip/.test(s))return'機票';if(/hotel|apa|liber|oasis|住宿|飯店/.test(s))return'住宿';if(/jr|metro|地鐵|電車|icoca|rapi|南海|巴士|客運|計程車|交通/.test(s))return'交通';if(/usj|環球|海遊館|teamlab|klook|門票|ticket|pass/.test(s))return'門票';if(/拉麵|午餐|晚餐|早餐|咖啡|燒|餐|牛|便當|飲料|甜點/.test(s))return'餐食';if(/藥妝|文具|伴手禮|唐吉|joshin|shimojima|購物|玩具/.test(s))return'購物';if(/lawson|family|7-11|便利商店|超商/.test(s))return'便利商店';return $('cat').value||'其他'}
function autoCat(){$('cat').value=suggest($('item').value)}
async function loadCloud(){try{$('status').textContent='正在同步雲端資料...';const {data,error}=await db.from('expenses').select('*').eq('trip_id',TRIP_ID).order('created_at',{ascending:false});if(error)throw error;cloud=(data||[]).map(x=>({id:x.id,date:x.date,cat:x.category||x.cat,item:x.item,jpy:Number(x.jpy||0),twd:Number(x.twd||0),pay:x.pay||'',created_by:x.created_by||'',fixed:false}));$('status').textContent='已同步 '+cloud.length+' 筆現場消費；固定費已列入。';render()}catch(e){$('status').textContent='同步失敗：'+e.message;render()}}
async function addExpense(){let item=$('item').value.trim();let y=Number($('jpy').value||0);let t=Number($('twd').value||0);let r=Number($('rate').value||0.22);if(!item){alert('請輸入項目');return}if(!y&&!t){alert('請輸入金額');return}if(!t&&y)t=Math.round(y*r);if(!y&&t)y=Math.round(t/r);const row={trip_id:TRIP_ID,date:$('date').value,category:suggest(item),item,jpy:y,twd:t,pay:$('pay').value,created_by:$('member').value};$('status').textContent='正在新增...';const {error}=await db.from('expenses').insert(row);if(error){alert('新增失敗：'+error.message);$('status').textContent='新增失敗';return}$('item').value='';$('jpy').value='';$('twd').value='';await loadCloud()}
function startEdit(id){let e=cloud.find(x=>x.id===id);if(!e)return;editing=id;$('editBox').innerHTML=`<div class="editBox"><h2>修改消費</h2><div class="grid"><div><label>日期</label><input id="edDate"></div><div><label>類別</label><input id="edCat"></div><div><label>項目</label><input id="edItem"></div><div><label>JPY</label><input id="edJpy" type="number"></div><div><label>TWD</label><input id="edTwd" type="number"></div><div><label>付款</label><input id="edPay"></div><div><label>記帳人</label><select id="edBy"><option>sacha</option><option>yang</option></select></div></div><p><button class="sun" onclick="saveEdit()">儲存</button><button class="white" onclick="cancelEdit()">取消</button></p></div>`;$('edDate').value=e.date;$('edCat').value=e.cat;$('edItem').value=e.item;$('edJpy').value=e.jpy;$('edTwd').value=e.twd;$('edPay').value=e.pay;$('edBy').value=e.created_by||'sacha'}
function cancelEdit(){editing=null;$('editBox').innerHTML=''}
async function saveEdit(){if(!editing)return;let payload={date:$('edDate').value,category:$('edCat').value,item:$('edItem').value,jpy:Number($('edJpy').value||0),twd:Number($('edTwd').value||0),pay:$('edPay').value,created_by:$('edBy').value};const {error}=await db.from('expenses').update(payload).eq('id',editing).eq('trip_id',TRIP_ID);if(error){alert('修改失敗：'+error.message);return}cancelEdit();await loadCloud()}
async function delRow(id){if(!confirm('確定刪除？'))return;const {error}=await db.from('expenses').delete().eq('id',id).eq('trip_id',TRIP_ID);if(error){alert('刪除失敗：'+error.message);return}await loadCloud()}
function render(){let rows=shown();let all=allRows();let sumJ=rows.reduce((a,b)=>a+b.jpy,0),sumT=rows.reduce((a,b)=>a+b.twd,0),totalJ=all.reduce((a,b)=>a+b.jpy,0),budget=Number($('budget').value||425000),pct=Math.round(totalJ/budget*100),remain=budget-totalJ;$('dash').innerHTML=`<div class="tile"><span>篩選日圓</span><b>${moneyY(sumJ)}</b></div><div class="tile"><span>篩選台幣</span><b>${moneyT(sumT)}</b></div><div class="tile"><span>預算使用率</span><b>${pct}%</b><div class="bar"><div class="fill" style="width:${Math.min(100,pct)}%"></div></div></div><div class="tile"><span>剩餘預算</span><b>${moneyY(remain)}</b></div>`;renderFixed();renderFamily();renderCats();renderDaily();renderList(rows)}
function renderFixed(){let stay=fixed.filter(x=>x.cat==='住宿').reduce((a,b)=>a+b.jpy,0);let flight=fixed.filter(x=>x.cat==='機票').reduce((a,b)=>a+b.jpy,0);$('fixedBox').innerHTML=`<table><tr><th>項目</th><th>JPY</th><th>TWD</th></tr>${fixed.map(x=>`<tr class="fixed"><td>${esc(x.item)}</td><td>${moneyY(x.jpy)}</td><td>${moneyT(x.twd)}</td></tr>`).join('')}<tr><th>住宿合計</th><th colspan="2">${moneyY(stay)} / NT$28,006</th></tr><tr><th>機票合計</th><th colspan="2">${moneyY(flight)} / NT$44,988</th></tr><tr><th>固定費總計</th><th colspan="2">¥330,680 / NT$72,994</th></tr></table>`}
function renderFamily(){let names=['固定費','sacha','yang'];let total=allRows().reduce((a,b)=>a+b.jpy,0)||1;$('family').innerHTML=names.map(n=>{let r=allRows().filter(x=>x.created_by===n),j=r.reduce((a,b)=>a+b.jpy,0),p=Math.round(j/total*100);return`<div class="tile"><span>${n}</span><b>${moneyY(j)}</b><span>${r.length}筆｜${p}%</span><div class="bar"><div class="fill" style="width:${p}%"></div></div></div>`}).join('')}
function renderCats(){let cats=['餐食','交通','門票','購物','住宿','機票','便利商店','其他'];let total=allRows().reduce((a,b)=>a+b.jpy,0)||1;$('cats').innerHTML=cats.map(c=>{let v=allRows().filter(x=>x.cat===c).reduce((a,b)=>a+b.jpy,0),p=Math.round(v/total*100);return`<b>${c}｜${moneyY(v)}｜${p}%</b><div class="bar"><div class="fill" style="width:${p}%"></div></div>`}).join('')}
function renderDaily(){let days=['7/23','7/24','7/25','7/26','7/27','7/28','7/29','7/30','7/31'];$('daily').innerHTML=`<table><tr><th>日期</th><th>JPY</th><th>TWD</th></tr>${days.map(d=>{let r=allRows().filter(x=>x.date===d);return`<tr><td>${d}</td><td>${moneyY(r.reduce((a,b)=>a+b.jpy,0))}</td><td>${moneyT(r.reduce((a,b)=>a+b.twd,0))}</td></tr>`}).join('')}</table>`}
function renderList(rows){$('list').innerHTML=`<table><tr><th>日期</th><th>類別</th><th>項目</th><th>金額</th><th>記帳</th><th>操作</th></tr>${rows.map(x=>`<tr class="${x.fixed?'fixed':''}"><td>${esc(x.date)}</td><td><span class="tag">${esc(x.cat)}</span></td><td>${esc(x.item)}</td><td>${moneyY(x.jpy)}<br>${moneyT(x.twd)}</td><td>${esc(x.pay)}<br><span class="small">${esc(x.created_by)}</span></td><td>${x.fixed?'固定費':`<button onclick="startEdit('${x.id}')">修改</button><button class="danger" onclick="delRow('${x.id}')">刪除</button>`}</td></tr>`).join('')}</table>`}
function exportCSV(){let rows=allRows();let csv='日期,類別,項目,日圓,台幣,付款方式,記帳人\n'+rows.map(x=>[x.date,x.cat,x.item,x.jpy,x.twd,x.pay,x.created_by].map(v=>'"'+String(v).replaceAll('"','""')+'"').join(',')).join('\n');let blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kansai-expenses.csv';a.click()}
filter.onchange=render;budget.onchange=render;rate.onchange=render;member.value=localStorage.getItem('member')||'sacha';member.onchange=()=>localStorage.setItem('member',member.value);loadCloud();
</script>
</body>
</html>
