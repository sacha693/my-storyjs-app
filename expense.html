<!doctype html>
<html lang="zh-Hant">
  <head><meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>旅費儀表板｜日本關西旅程</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7fd3df">
    <style>:root
      {--ink:#12323a;--line:#12323a;
       --blue:#7fd3df;--paper:#f7fdff;
       --soft:#e7fbff;
       --sun:#f4c95d;
       --rose:#ffd7e5;
       --mint:#d8f5ec;
       --red:#ffd7d7}*{box-sizing:border-box}
      body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;
           background:radial-gradient(circle at 12% 5%,#fff4ad 0 5%,transparent 12%),
             linear-gradient(#bdeef5,#f7fdff);color:var(--ink);
           line-height:1.6}.wrap{max-width:1080px;
                                 margin:auto;
                                 padding:14px 14px 100px}.
      card{background:var(--paper);                                                        
           border:4px solid var(--line);                                                                      
           border-radius:24px;
           padding:16px;margin:14px 0;
           box-shadow:5px 5px 0 rgba(18,50,58,.22)}
      h1,h2,h3{line-height:1.2}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}.
      dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
           gap:12px}.tile{background:#fff;border:4px solid var(--line);border-radius:20px;
                          padding:14px;box-shadow:4px 4px 0 rgba(18,50,58,.2)}.tile b{font-size:26px;display:block}.
      ok{background:var(--mint)}.warnBox{background:#fff2b8}.
      over{background:var(--red)}label{font-weight:900;font-size:14px}
      input,select{width:100%;padding:11px; border:3px solid var(--line);border-radius:12px;background:#fff;font:inherit}
      button,.btn{display:inline-block;border:3px solid var(--line);background:var(--blue);color:var(--ink);text-decoration:none;
                  border-radius:14px;padding:10px 13px;font-weight:900;box-shadow:3px 3px 0 var(--line);margin:5px 4px 5px 0;cursor:pointer}.
      btn.white,button.white{background:#fff}.btn.sun,button.sun{background:var(--sun)}.danger{background:var(--red)}
      table{width:100%;border-collapse:collapse;background:#fff;border:4px solid var(--line);box-shadow:5px 5px 0 rgba(18,50,58,.18);margin:12px 0}
      th,td{border:2px solid var(--line);padding:9px;text-align:left;vertical-align:top}
      th{background:var(--blue)}.small{font-size:13px;opacity:.85}.
      tag{display:inline-block; border:2px solid var(--line);border-radius:999px;padding:2px 7px;font-size:12px;font-weight:900;background:var(--soft)}.
      bar{height:18px;background:#fff;border:3px solid var(--line);border-radius:999px;overflow:hidden;margin:6px 0}.
      fill{height:100%;background:var(--blue)}.fill.warn{background:var(--sun)}.fill.over{background:#ff8a8a}.
      float{position:fixed;right:12px;z-index:9999;border:3px solid var(--line);border-radius:999px;padding:12px 14px;font-weight:900;
            text-decoration:none;color:var(--ink);box-shadow:3px 3px 0 var(--line)}.
      f1{bottom:192px;background:#fff}.
      f2{bottom:132px;background:var(--blue)}.
      f3{bottom:72px;background:var(--sun)}.
      f4{bottom:12px;background:#fff}@media(max-width:650px)
      {.wrap{padding:10px 10px 100px}table{font-size:13px}.btn,button{width:100%;text-align:center}.
       float{right:8px;padding:10px 12px;font-size:14px}.tile b{font-size:22px}}
    </style>
  </head>
  <body>
    <a class="float f1" href="index.html">🏠 主頁</a>
    <a class="float f2" href="index.html#days">📍 快速</a>
    <a class="float f3" href="guide.html">🎧 導覽</a>
    <a class="float f4" href="#top">⬆️</a>
    <main class="wrap" id="top">
              <section class="card">
                <h1>💰 旅費儀表板</h1><p>每日消費記帳＋預算控管。住宿費與機票費可一鍵匯入，資料會保存在這支手機瀏覽器裡。</p>
                <p><a class="btn white" href="index.html">回主頁</a>
                  <button class="sun" onclick="importFixedCosts()">匯入住宿＋機票</button>
                  <button class="sun" onclick="exportCSV()">匯出CSV</button>
                  <button onclick="seedSample()">加入範例</button>
                  <button class="danger" onclick="clearAll()">清空全部</button>
                </p>
              </section>
              <section class="card">
                <h2>預算設定</h2><div class="grid">
                  <div><label>總預算 JPY</label>
                  <input id="budgetJpy" type="number" value="425000" onchange="saveBudget();render()">
                  </div>
                  <div><label>匯率 TWD/JPY</label><input id="rate" type="number" step="0.001" value="0.22" onchange="saveBudget();render()"></div>
                  <div><label>日期篩選</label><select id="filterDate" onchange="render()"><option value="all">全部日期</option>
                    <option>7/23</option>
                    <option>7/24</option>
                    <option>7/25</option>
                    <option>7/26</option>
                    <option>7/27</option>
                    <option>7/28</option>
                    <option>7/29</option>
                    <option>7/30</option>
                    <option>7/31</option>
                  </select>
                  </div>
                </div>
              </section>
              <section class="dash" id="dashboard">
              </section>
              <section class="card"><h2>固定費匯入狀態</h2>
                <div id="lodgingStatus"></div>
              </section>
              <section class="card">
                <h2>新增一筆消費</h2>
                <div class="grid">
                  <div><label>日期</label><select id="date">
                    <option>7/23</option>
                    <option>7/24</option>
                    <option>7/25</option>
                    <option>7/26</option>
                    <option>7/27</option>
                    <option>7/28</option>
                    <option>7/29</option>
                    <option>7/30</option>
                    <option>7/31</option>
                  </select>
                  </div>
                  <div><label>類別</label>
                    <select id="cat">
                      <option>餐食</option>
                      <option>交通</option>
                      <option>門票</option>
                      <option>購物</option>
                      <option>住宿</option>
                      <option>機票</option>
                      <option>便利商店</option>
                      <option>其他</option>
                    </select>
                  </div>
                  <div><label>項目</label>
                    <input id="item" placeholder="例如：拉麵、藥妝">
                  </div>
                  <div>
                    <label>金額 JPY</label>
                    <input id="jpy" type="number"></div>
                  <div><label>金額 TWD</label><input id="twd" type="number"></div>
                  <div><label>付款方式</label>
                    <select id="pay"><option>現金</option><option>信用卡</option><option>IC卡</option><option>其他</option></select>
                  </div>
                </div>
                <p><button onclick="addExpense()">新增消費</button></p>
              </section>
              <section class="card">
                <h2>類別比例</h2>
                <div id="categoryBars"></div>
              </section>
              <section class="card"><h2>每日小計</h2>
                <div id="daily"></div>
              </section>
              <section class="card"><h2>消費明細</h2>
                <div id="list"></div>
              </section>
            </main>
    <script>let expenses=JSON.parse(localStorage.getItem('kansaiExpenses')||'[]');
      let settings=JSON.parse(localStorage.getItem('kansaiBudgetSettings')||'{"budgetJpy":425000,"rate":0.22}');
      const lodging=[{id:'lodging-apa',date:'7/24',cat:'住宿',
                      item:'APA Hotel Osaka Temmabashi Ekimae｜Agoda 1715112246｜7/24-7/26',jpy:48544,twd:10680,pay:'信用卡'},
                     {id:'lodging-liber',date:'7/26',cat:'住宿',
                      item:'Liber Hotel Osaka｜Trip 1616329233185585 / 8RAXG31G｜7/26-7/28',jpy:53300,twd:11970,pay:'信用卡'},
                     {id:'lodging-oasis',date:'7/28',cat:'住宿',item:'OASIS NANIWA｜易遊網 ORD0029621149｜7/28-7/31',jpy:24345,twd:5356,pay:'信用卡'}];
      const fixedCosts=[...lodging,{id:'flight-trip',date:'7/24',cat:'機票',item:'長榮航空 BR134 / BR177｜Trip.com 1616329870509999｜4人來回機票',jpy:204491,twd:44988,pay:'信用卡'}];
      budgetJpy.value=settings.budgetJpy;rate.value=settings.rate;function saveBudget()
      {settings={budgetJpy:Number(budgetJpy.value||425000),rate:Number(rate.value||0.22)};localStorage.
        setItem('kansaiBudgetSettings',JSON.stringify(settings))}
      function moneyJPY(n)
      {return '¥'+Math.round(Number(n||0)).
        toLocaleString()}
      function moneyTWD(n){return 'NT$'+Math.round(Number(n||0)).toLocaleString()}
      function save(){localStorage.setItem('kansaiExpenses',JSON.stringify(expenses))}
      function importFixedCosts(){fixedCosts.forEach(l=>{if(!expenses.some(e=>e.id===l.id)){expenses.unshift({...l})}});save();render()}
      function importLodging(){importFixedCosts()}
      function addExpense()
      {saveBudget();const d=date.value,c=cat.value,it=item.value.trim()||'未命名消費';
       let y=Number(jpy.value||0);
       let t=Number(twd.value||0);
       if(!t&&y)t=Math.round(y*settings.rate);
       if(!y&&t)y=Math.round(t/settings.rate);
       expenses.unshift({id:Date.now(),date:d,cat:c,item:it,jpy:y,twd:t,pay:pay.value});
       save();item.value='';jpy.value='';twd.value='';render()}
      function removeExpense(id){expenses=expenses.filter(e=>e.id!==id);save();render()}
      function render(){saveBudget();
                        const f=filterDate.value; 
                        const rows=expenses.filter(e=>f==='all'||e.date===f);
                        let sj=rows.reduce((a,e)=>a+Number(e.jpy||0),0);
                        let st=rows.reduce((a,e)=>a+Number(e.twd||0),0);
                        let allJ=expenses.reduce((a,e)=>a+Number(e.jpy||0),0);
                        let budget=Number(settings.budgetJpy||425000);
                        let remain=budget-allJ;
                        let pct=budget?Math.round(allJ/budget*100):0;
                        let status=pct<75?'ok':pct<100?'warnBox':'over';
                        dashboard.innerHTML=`<div class="tile">
                        <span>篩選日圓</span><b>${moneyJPY(sj)}</b>
                        </div>
                        <div class="tile">
                        <span>篩選台幣</span><b>${moneyTWD(st)}</b></div><div class="tile ${status}">
                        <span>預算使用率</span><b>${pct}%</b><div class="bar">
                        <div class="fill ${pct>=100?'over':pct>=75?'warn':''}" style="width:${Math.min(100,pct)}%">
                        </div>
                        </div>
                        </div>
                        <div class="tile"><span>剩餘預算</span><b>${moneyJPY(remain)}</b>
                        <span class="small">約 ${moneyTWD(remain*settings.rate)}</span>
                        </div>`;
                        lodgingStatus.innerHTML=`<table><tr><th>固定費</th><th>金額</th><th>狀態</th></tr>
                        ${fixedCosts.map(l=>`<tr><td>${l.item}</td><td>${moneyJPY(l.jpy)}
                        <br>${moneyTWD(l.twd)}</td><td>${expenses.some(e=>e.id===l.id)?'已匯入':'未匯入'}</td>
                        </tr>`).join('')}<tr><th>住宿合計</th>
                        <th colspan="2">¥126,189 / NT$28,006</th></tr><tr><th>機票合計</th><th colspan="2">¥204,491 / NT$44,988</th></tr><tr><th>固定費總計</th><th colspan="2">¥330,680 / NT$72,994</th></tr>
                        </table>`;list.innerHTML=rows.length?`
                        <table><tr><th>日期</th><th>類別</th><th>項目</th><th>金額</th><th>付款</th><th></th></tr>
                        ${rows.map(e=>`<tr><td>${e.date}</td><td><span class="tag">
                        ${e.cat}</span></td><td>${e.item}</td><td>${moneyJPY(e.jpy)}<br>
                        ${moneyTWD(e.twd)}</td><td>${e.pay}</td><td><button class="danger" onclick="removeExpense('${e.id}')">刪除</button>
                        </td></tr>`).join('')}</table>
                        `:'<p>目前沒有消費紀錄。</p>';
                        const days=['7/23','7/24','7/25','7/26','7/27','7/28','7/29','7/30','7/31'];
                        daily.innerHTML=`<table><tr><th>日期</th><th>日圓</th><th>台幣</th><th>狀態</th></tr>
                        ${days.map(d=>{let r=expenses.filter(e=>e.date===d);
                                       let y=r.reduce((a,e)=>a+Number(e.jpy||0),0);
                                       let avg=Number(settings.budgetJpy||425000)/9;
                                       let s=y>avg*1.3?'偏高':y>0?'正常':'未記錄';
                                       return `<tr><td>${d}</td><td>${moneyJPY(y)}</td><td>${moneyTWD(r.reduce((a,e)=>a+Number(e.twd||0),0))}
                                       </td><td>${s}</td></tr>`}).join('')}</table>`;
                        const cats=['餐食','交通','門票','購物','住宿','機票','便利商店','其他'];
                        let total=expenses.reduce((a,e)=>a+Number(e.jpy||0),0)||1;categoryBars.innerHTML=cats.map(c=>{let v=expenses.filter(e=>e.cat===c).
                          reduce((a,e)=>a+Number(e.jpy||0),0);let p=Math.round(v/total*100);return `<div><b>${c}｜${moneyJPY(v)}｜${p}%</b>
                          <div class="bar"><div class="fill" style="width:${p}%"></div>
                          </div>
                          </div>`}).join('')}
      function exportCSV()
      {const header='日期,類別,項目,日圓,台幣,付款方式\n';const body=expenses.map(e=>[e.date,e.cat,e.item,e.jpy,e.twd,e.pay].map(v=>'"'+String(v).replaceAll('"','""')+'"').join(',')).join('\n');
       const blob=new Blob(['\ufeff'+header+body],{type:'text/csv;charset=utf-8'});
       const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kansai-expenses.csv';a.click()}
      function clearAll(){if(confirm('確定清空所有消費紀錄？')){expenses=[];save();render()}}
      function seedSample(){expenses.unshift({id:Date.now()+1,date:'7/24',cat:'餐食',item:'神戶牛午餐',jpy:38000,twd:8360,pay:'信用卡'},
                                             {id:Date.now()+2,date:'7/26',cat:'門票',item:'海遊館門票',jpy:8000,twd:1760,pay:'信用卡'},
                                             {id:Date.now()+3,date:'7/28',cat:'購物',item:'心齋橋文具',jpy:6000,twd:1320,pay:'現金'});
                            save();render()}importFixedCosts();
      if('serviceWorker'in navigator){navigator.serviceWorker.register('service-worker.js').catch(()=>{})}render();
</script>
</body>
</html>
