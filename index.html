<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>金童家日本關西旅程</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#7fd3df"><style>:root{--ink:#102f38;--muted:#5b7780;--blue:#5fc7d8;--blue2:#eafcff;--paper:rgba(255,255,255,.9);--sun:#f2c45a;--line:rgba(16,47,56,.18);--shadow:0 18px 45px rgba(16,47,56,.15)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:radial-gradient(circle at 12% 4%,#fff0a8 0 7%,transparent 18%),radial-gradient(circle at 90% 0,#b7f2ff 0 18%,transparent 38%),linear-gradient(180deg,#bceefa,#f7fdff 58%,#e7fbff);color:var(--ink);line-height:1.65}.wrap{max-width:1120px;margin:auto;padding:18px 16px 120px}.hero,details{background:var(--paper);border:1px solid rgba(255,255,255,.8);border-radius:30px;padding:18px;margin:16px 0;box-shadow:var(--shadow);backdrop-filter:blur(12px)}.eyebrow{display:inline-block;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-weight:900;color:var(--muted)}.title{font-size:clamp(34px,7vw,64px);line-height:1.04;margin:10px 0 6px;font-weight:1000}.subtitle{font-weight:800;color:var(--muted);margin:0 0 16px}.heroPhoto{margin:18px 0 8px;border-radius:28px;overflow:hidden;border:1px solid rgba(16,47,56,.16);background:#fff}.heroPhoto img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover}.heroPhotoCaption{padding:10px 14px;font-size:14px;color:var(--muted);font-weight:800;background:rgba(255,255,255,.88)}.navGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px}.navBtn,.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--line);background:#fff;color:var(--ink);text-decoration:none;border-radius:18px;padding:11px 13px;font-weight:1000;box-shadow:0 8px 20px rgba(16,47,56,.09);margin:4px}.primary{background:linear-gradient(135deg,#5fc7d8,#b9f4fb)}.money{background:linear-gradient(135deg,#d8f5ec,#ffffff)}.ico{font-size:22px}.mini{display:block;font-size:12px;color:var(--muted);font-weight:800}.section-title{font-size:28px;display:inline-block;border-bottom:5px solid var(--blue);margin:28px 0 8px}details{padding:0;overflow:hidden}summary{cursor:pointer;list-style:none;padding:18px;background:linear-gradient(135deg,rgba(255,255,255,.9),rgba(231,251,255,.95))}summary::-webkit-details-marker{display:none}.day-title{font-size:23px;font-weight:1000}.day-sub{font-size:14px;color:var(--muted)}.content{padding:14px 18px 20px}.route{background:var(--blue2);border:1px dashed rgba(16,47,56,.35);border-radius:18px;padding:11px;margin:8px 0 12px;font-weight:900}.leaveBox{border:1px solid var(--line);border-radius:18px;padding:11px;margin:10px 0;font-weight:900;background:#fff3c6}.ticketFold{background:#fff;border:1px solid var(--line);border-radius:18px;margin:10px 0;overflow:hidden}.ticketFold summary{background:linear-gradient(135deg,#f2c45a,#fff1b8);padding:12px 14px;font-weight:1000}.ticketBody{padding:10px 12px}.ticketItem{background:#f7fdff;border:1px solid var(--line);border-radius:14px;padding:9px;margin:8px 0;font-weight:900}.fareBox{background:#102f38;color:#fff;border-radius:16px;padding:12px;margin:8px 0;font-weight:1000}.fareBox small{display:block;opacity:.85}.blockTitle{font-size:16px;font-weight:1000;margin:14px 0 8px}.quickBtns{display:flex;gap:7px;flex-wrap:wrap;margin:6px 0 12px}.quickBtns .btn{background:var(--blue)}.tripBox{background:#fff;border:1px solid var(--line);border-radius:18px;margin:10px 0;overflow:hidden}.tripBox summary{padding:12px 14px;background:var(--sun);font-weight:1000}.tripBody{padding:10px 12px}.step{background:#f7fdff;border:1px solid var(--line);border-radius:14px;padding:10px;margin:8px 0}.step b{display:block}.exit{background:#fff3c6;border-radius:10px;padding:8px;margin-top:6px;font-weight:900}.note{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;margin-top:10px;font-weight:850}.floatDock{position:fixed;left:10px;right:10px;bottom:10px;z-index:20;display:grid;grid-template-columns:repeat(4,1fr);gap:7px;max-width:720px;margin:auto}.dockBtn{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:18px;padding:8px 4px;text-align:center;text-decoration:none;color:var(--ink);font-weight:1000;box-shadow:0 10px 25px rgba(16,47,56,.16);font-size:12px}.dockBtn span{display:block;font-size:20px;line-height:1}@media(max-width:700px){.wrap{padding:10px 10px 105px}.navGrid{grid-template-columns:repeat(2,1fr)}.btn{width:100%}.floatDock{grid-template-columns:repeat(4,1fr)}.dockBtn{font-size:11px}.hero,details{border-radius:22px}.day-title{font-size:21px}}</style></head><body id="top"><main class="wrap"><section class="hero"><span class="eyebrow">2026 關西親子自由行</span><h1 class="title">金童家關西旅程</h1><p class="subtitle">每日行程 × 快速導航 × 交通詳情整合版</p><div class="heroPhoto"><img src="https://github.com/sacha693/my-storyjs-app/blob/main/ChatGPT%20Image%202026%E5%B9%B45%E6%9C%889%E6%97%A5%20%E4%B8%8B%E5%8D%8809_28_18.png?raw=true" alt="金童家關西旅程封面圖"><div class="heroPhotoCaption">金童家關西旅程｜神戶・大阪・USJ・京都</div></div><div class="navGrid"><a class="navBtn primary" href="#days"><span class="ico">🗓️</span><span>每日行程<span class="mini">含導航與交通</span></span></a><a class="navBtn money" href="expense.html"><span class="ico">💰</span><span>旅費記帳<span class="mini">住宿已匯入</span></span></a><a class="navBtn" href="reminders.html"><span class="ico">⏰</span><span>出門提醒<span class="mini">行事曆提醒</span></span></a><a class="navBtn" href="usj.html"><span class="ico">🎢</span><span>USJ攻略<span class="mini">不排隊策略</span></span></a></div></section><h2 id="days" class="section-title">每日行程細節</h2><section id="app"></section></main><nav class="floatDock"><a class="dockBtn" href="#top"><span>🏠</span>首頁</a><a class="dockBtn" href="#days"><span>🗓️</span>行程</a><a class="dockBtn" href="expense.html"><span>💰</span>記帳</a><a class="dockBtn" href="reminders.html"><span>⏰</span>提醒</a></nav><script>if(location.search){history.replaceState(null,'',location.pathname+location.hash)}const map=q=>'https://www.google.com/maps?q='+encodeURIComponent(q);const gmail='https://mail.google.com/mail/#all/19d0bc83a8e341b3';const days=[{d:'Day 0',date:'7/23',title:'台中 → 桃園機場過夜',sub:'前一天晚上出發，降低凌晨趕車壓力。',leave:'20:20 台中火車站附近集合；21:00 搭客運前往桃園機場。',tickets:['護照、機票截圖、飯店訂單截圖先放手機相簿。'],route:['台中火車站 → 客運 → 桃園機場 T2 → 5F 美食街外圍休息'],go:['台中火車站／台中轉運站 → 國光或統聯客運 → 桃園機場第二航廈。最近出口：抵達 T2 後依 5F 美食街指標。'],back:['無回程；抵達機場後以休息為主。'],buttons:[['🚌 台中火車站','台中火車站'],['✈ 桃園機場T2','桃園國際機場第二航廈']],note:'提早到站，確認護照、機票截圖、頸枕、外套與小孩零食。'},{d:'Day 1',date:'7/24',title:'神戶牛＋大阪天神祭宵宮',sub:'神戶進、大阪住，第一天不塞太滿。',leave:'04:20 桃園機場 T2 報到；10:00 抵達神戶機場；15:30 前後到 APA 天滿橋休息。',tickets:['長榮 BR134，06:20 桃園 T2 → 10:00 神戶機場，PNR：FP5WJ4。','Trip.com 訂單編號：1616329870509999。','機票總計 TWD44,988；票價 TWD31,551；稅項及費用 TWD13,437。','Mouriya 本店神戶牛午餐訂位資訊請先截圖。'],route:['桃園 T2 → 神戶機場 → 三宮 → Mouriya 本店 → APA 天滿橋 → 天神祭宵宮'],go:['神戶機場站 → Port Liner → 三宮站。最近出口：往三宮站西側／北野坂方向，步行到 Mouriya 本店較順。','三宮站 → JR／阪神進大阪市區 → Osaka Metro 谷町線 → 天滿橋站。最近出口：天滿橋站 4 號出口較接近 APA 天滿橋方向。'],back:['APA 天滿橋 → 步行 → 天滿橋大川河岸。最近方向：往大川河岸方向，避開橋中央。','天滿橋河岸 → 步行 → APA 天滿橋。回程建議沿河岸外側走。'],buttons:[['🛬 神戶機場','神戶機場'],['🚃 三宮站','三宮駅'],['🥩 Mouriya本店','Mouriya Honten Kobe'],['🏨 APA天滿橋','APA Hotel Osaka Temmabashi Ekimae'],['🎆 天神祭宵宮','天満橋 大川 大阪 天神祭']],note:'神戶牛吃完先到大阪休息，晚上只感受祭典氣氛。'},{d:'Day 2',date:'7/25',title:'童書之森＋天神祭本宮',sub:'白天室內輕鬆，晚上看祭典。',leave:'09:10 出門去童書之森；17:30 出門前往天神祭觀賞點。',tickets:['若童書之森需預約，請將預約畫面截圖。','祭典日不需票券，但建議先保存觀賞點地圖。'],route:['APA天滿橋 → 童書之森中之島 → 北浜午餐 → 飯店午休 → 天滿橋觀賞點'],go:['天滿橋站 → 京阪中之島線／步行銜接 → なにわ橋站。最近出口：なにわ橋站 1 號出口，往中之島公園與童書之森。','童書之森中之島 → 步行 → 北浜咖啡區。最近方向：往北浜站、土佐堀川河岸咖啡區。'],back:['北浜 → 京阪／步行 → APA 天滿橋。最近出口：天滿橋站 4 號出口或依飯店地圖。','天滿橋河岸 → 步行 → APA 天滿橋。沿南側河岸外圍回飯店。'],buttons:[['🌿 童書之森','こども本の森 中之島'],['☕ 北浜咖啡午餐','北浜 カフェ 大阪'],['🏨 回APA飯店','APA Hotel Osaka Temmabashi Ekimae'],['🎆 親子觀賞點','34.6923,135.5200']],note:'親子版不擠橋中央。帶小風扇、水、濕紙巾。'},{d:'Day 3',date:'7/26',title:'海遊館主軸＋移動到 USJ 區',sub:'一個主景點，不消耗隔天 USJ 體力。',leave:'09:30 退房出門；10:30 抵達海遊館較剛好；15:30 前後到 Liber Hotel。',tickets:['海遊館票券／QR Code 先截圖。','Liber Hotel 訂單截圖。'],route:['天滿橋 → 海遊館 → 天保山午餐 → Liber Hotel'],go:['天滿橋站 → Osaka Metro 谷町線轉中央線 → 大阪港站。最近出口：大阪港站 1 號出口，最接近海遊館與天保山 Market Place。','大阪港站 → 中央線至弁天町，轉 JR 大阪環狀線到西九條，再轉 JR 夢咲線 → 櫻島站。最近出口：櫻島站出站後依 Liber Hotel 指標步行。'],back:['Liber Hotel → 步行或 JR 夢咲線 → Universal CityWalk。最近方向：若要進 USJ 正門請以環球城站為主。','Universal CityWalk → 步行／JR → Liber Hotel。晚餐後直接回飯店。'],buttons:[['🐠 大阪海遊館','Osaka Aquarium Kaiyukan'],['🍽 天保山午餐','Tempozan Marketplace'],['🏨 Liber Hotel','Liber Hotel Osaka'],['🍜 CityWalk晚餐','Universal CityWalk Osaka']],note:'下午回飯店休息，為隔天 USJ 存體力。'},{d:'Day 4',date:'7/27',title:'USJ 環球影城',sub:'早上熱門、下午表演與輕鬆設施。',leave:'07:20 出門；07:30～08:00 到 USJ 門口排隊。',tickets:['USJ 門票 QR Code 截圖。','Express Pass 截圖，入園前先確認指定時段。','任天堂世界整理券／入場資訊請入園後確認。'],route:['Liber Hotel → 環球城站／USJ入口 → 哈利波特/任天堂 → 蘑菇餐廳 → 水世界 → CityWalk'],go:['Liber Hotel → 步行約 10～15 分鐘，或櫻島站搭 JR 夢咲線 1 站 → 環球城站。最近出口：環球城站出站後穿過 Universal CityWalk，跟著 USJ 入口指標。','USJ入口 → 園區步行 → 任天堂世界／哈利波特區。最快方向：入園後不要先逛商店。'],back:['USJ入口 → Universal CityWalk → 步行或 JR 夢咲線 → Liber Hotel。最近方向：出園後穿過 CityWalk，避開商店街停留。'],buttons:[['🎢 USJ園區','Universal Studios Japan'],['🚉 環球城站','ユニバーサルシティ駅'],['🍄 任天堂世界','Super Nintendo World USJ'],['🎈 小小兵樂園','Minion Park USJ'],['📘 USJ攻略','usj.html']],note:'USJ 正門最近站是環球城站；櫻島站較適合 Liber Hotel。熱門設施排超過40分鐘就考慮放棄。'},{d:'Day 5',date:'7/28',title:'換飯店＋心齋橋購物恢復日',sub:'USJ隔天恢復體力，慢慢逛。',leave:'10:30 退房移動到市區；14:00 前後安排心齋橋購物。',tickets:['OASIS NANIWA 住宿訂單截圖。','購物退稅可能需要護照，請放隨身包。'],route:['Liber/USJ區 → OASIS NANIWA → 難波午餐 → シモジマ → 道頓堀'],go:['櫻島站／環球城站 → JR 夢咲線 → 西九條站 → 阪神難波線 → 大阪難波站。最近出口：往 OASIS NANIWA 依地圖出口；難波商圈可用 14、15-B 方向。','大阪難波／難波站 → Osaka Metro 御堂筋線 → 心齋橋站。最近出口：心齋橋站 5、6 號出口往心齋橋筋與シモジマ方向。'],back:['道頓堀 → 步行／Metro → OASIS NANIWA。人潮多時走外圍道路，不要穿越最擠的戎橋。'],buttons:[['🏨 OASIS NANIWA','OASIS NANIWA Osaka'],['✏ シモジマ','Shimojima Shinsaibashi'],['🥞 美津の大阪燒','Mizuno Okonomiyaki Osaka']],note:'購物要慢慢逛，咖啡休息不要省。'},{d:'Day 6',date:'7/29',title:'京都 teamLab',sub:'一主一副，看光影、走河邊，不暴走京都。',leave:'10:00 出發前往京都；11:30 京都車站午餐；13:00 teamLab 入場。',tickets:['Klook 訂單 TXM612450。','teamLab Biovortex Kyoto 入場時間：2026-07-29 13:00。','成人1、兒童1、傷殘人士優惠2；不可取消、退款或更改訂單。'],route:['大阪 → 京都車站 → 拉麵小路 → teamLab Biovortex Kyoto → 鴨川或祇園 → 回大阪'],go:['大阪站 → JR 京都線 → 京都站。最近出口：京都站中央口適合車站用餐；前往 teamLab 建議八條東口／東南側方向。','京都站 → 步行或短程計程車 → teamLab Biovortex Kyoto。最近出口：京都站八條東口。','京都站／teamLab → 公車／計程車／京阪線 → 祇園四条站／鴨川。最近出口：祇園四条站 6、7 號出口。'],back:['祇園四条／京都站 → JR 京都線或阪急／京阪 → 大阪站／難波。最近方向：京都站回程依 JR 中央口；人多時用計程車回京都站較省力。'],buttons:[['🚉 京都車站','Kyoto Station'],['🍜 京都拉麵小路','Kyoto Ramen Street'],['✨ teamLab','teamLab Biovortex Kyoto'],['🌿 鴨川','Kamo River Kyoto'],['🏨 回OASIS','OASIS NANIWA Osaka']],note:'teamLab 入場時間 13:00，鴨川/祇園二選一。'},{d:'Day 7',date:'7/30',title:'自由購物＋補買日',sub:'整天保留彈性。',leave:'睡晚一點，建議 10:30 後再出門；下午保留整理行李時間。',tickets:['購物退稅需護照。','如有藥妝折價券，先截圖放手機相簿。'],route:['OASIS → Joshin Super Kids Land → 黑門市場／難波補買 → 飯店整理行李'],go:['OASIS NANIWA → 步行或 Osaka Metro → 日本橋站／黑門市場。最近出口：日本橋站 10 號出口方向。','難波站 → 步行 → Joshin Super Kids Land。最近出口：難波站往南海難波／日本橋／電電城方向出口。'],back:['黑門市場／日本橋 → 步行或 Metro → OASIS NANIWA。採買後先回住宿放東西。'],buttons:[['🧸 Joshin Super Kids Land','Joshin Super Kids Land Osaka'],['🛍 黑門市場','Kuromon Market'],['🏨 回OASIS','OASIS NANIWA Osaka']],note:'購物與整理日，不要排太滿。'},{d:'Day 8',date:'7/31',title:'回程日',sub:'早上直接前往關西機場。',leave:'08:00 出發前往關西機場；09:00 前抵達 T1 最穩。',tickets:['長榮 BR177，11:10 關西機場 T1 → 13:05 桃園 T2，PNR：FP5WJ4。','Trip.com 訂單編號：1616329870509999。','機票總計 TWD44,988；票價 TWD31,551；稅項及費用 TWD13,437。'],route:['飯店 → 南海難波站 → 南海電鐵 Rapi:t／空港急行 → 關西機場 T1'],go:['OASIS NANIWA → 步行／地下鐵銜接 → 南海難波站。最近出口／方向：往南海難波站 3F 改札口。','南海難波站 → 南海電鐵 Rapi:t／空港急行 → 關西機場站。最近出口：出閘後依 Terminal 1／國際線出發指標。'],back:['關西機場 T1 → 長榮航空 BR177 → 桃園機場 T2。抵台後依入境／行李轉盤指標。'],buttons:[['🚆 難波站','Namba Station'],['✈ 關西機場T1','Kansai International Airport Terminal 1']],note:'BR177 11:10 起飛，09:00 前到機場最穩。'}];function list(arr){return arr.map((t,i)=>`<div class="step"><b>${i+1}. ${t.split('。')[0]}</b><div class="exit">${t.split('。').slice(1).join('。')}</div></div>`).join('')}function ticketList(arr){return arr.map(t=>t.includes('機票總計')?`<div class="fareBox">${t}<small>來源：Trip.com 付款成功郵件</small></div>`:`<div class="ticketItem">${t}</div>`).join('')}function render(){app.innerHTML=days.map((d,i)=>`<details ${i<2?'open':''}><summary><div class="day-title">${d.d}｜${d.date}｜${d.title}</div><div class="day-sub">${d.sub}</div></summary><div class="content"><div class="leaveBox">⏰ 建議出發時間：${d.leave}</div><details class="ticketFold"><summary>🎟️ 票券資訊｜點我展開 / 收起</summary><div class="ticketBody">${ticketList(d.tickets)}<a class="btn" target="_blank" href="${gmail}">📩 開啟 Gmail 憑證信</a></div></details><div class="route">${d.route.map(r=>'→ '+r).join('<br>')}</div><div class="blockTitle">📍 快速導航</div><div class="quickBtns">${d.buttons.map(b=>b[1].endsWith('.html')?`<a class="btn" href="${b[1]}">${b[0]}</a>`:`<a class="btn" target="_blank" href="${map(b[1])}">${b[0]}</a>`).join('')}</div><div class="blockTitle">🚃 交通詳情</div><details class="tripBox" open><summary>去程交通｜站名・路線名・最近出口</summary><div class="tripBody">${list(d.go)}</div></details><details class="tripBox"><summary>回程交通｜站名・路線名・最近出口</summary><div class="tripBody">${list(d.back)}</div></details><div class="note">${d.note}</div></div></details>`).join('')}render();</script></body></html>
