<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>金童家日本關西旅程</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#7fd3df"><style>:root{--ink:#102f38;--muted:#5b7780;--blue:#5fc7d8;--blue2:#eafcff;--paper:rgba(255,255,255,.9);--sun:#f2c45a;--mint:#d8f5ec;--line:rgba(16,47,56,.18);--shadow:0 18px 45px rgba(16,47,56,.15)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:radial-gradient(circle at 12% 4%,#fff0a8 0 7%,transparent 18%),radial-gradient(circle at 90% 0,#b7f2ff 0 18%,transparent 38%),linear-gradient(180deg,#bceefa,#f7fdff 58%,#e7fbff);color:var(--ink);line-height:1.65}.wrap{max-width:1120px;margin:auto;padding:18px 16px 120px}.hero,.card,details{background:var(--paper);border:1px solid rgba(255,255,255,.8);border-radius:30px;padding:18px;margin:16px 0;box-shadow:var(--shadow);backdrop-filter:blur(12px)}.eyebrow{display:inline-block;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-weight:900;color:var(--muted)}.title{font-size:clamp(34px,7vw,64px);line-height:1.04;margin:10px 0 6px;font-weight:1000}.subtitle{font-weight:800;color:var(--muted);margin:0 0 16px}.heroPhoto{margin:18px 0 8px;border-radius:28px;overflow:hidden;border:1px solid rgba(16,47,56,.16);background:#fff}.heroPhoto img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover}.heroPhotoCaption{padding:10px 14px;font-size:14px;color:var(--muted);font-weight:800;background:rgba(255,255,255,.88)}.navGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px}.navBtn,.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--line);background:#fff;color:var(--ink);text-decoration:none;border-radius:18px;padding:11px 13px;font-weight:1000;box-shadow:0 8px 20px rgba(16,47,56,.09);margin:4px}.primary{background:linear-gradient(135deg,#5fc7d8,#b9f4fb)}.ticket{background:linear-gradient(135deg,#f2c45a,#fff1b8)}.money{background:linear-gradient(135deg,#d8f5ec,#ffffff)}.ico{font-size:22px}.mini{display:block;font-size:12px;color:var(--muted);font-weight:800}.section-title{font-size:28px;display:inline-block;border-bottom:5px solid var(--blue);margin:28px 0 8px}details{padding:0;overflow:hidden}summary{cursor:pointer;list-style:none;padding:18px;background:linear-gradient(135deg,rgba(255,255,255,.9),rgba(231,251,255,.95))}summary::-webkit-details-marker{display:none}.day-title{font-size:23px;font-weight:1000}.day-sub{font-size:14px;color:var(--muted)}.content{padding:14px 18px 20px}.route{background:var(--blue2);border:1px dashed rgba(16,47,56,.35);border-radius:18px;padding:11px;margin:8px 0 12px;font-weight:900}.blockTitle{font-size:16px;font-weight:1000;margin:14px 0 8px}.quickBtns{display:flex;gap:7px;flex-wrap:wrap;margin:6px 0 12px}.quickBtns .btn{background:var(--blue)}.tripBox{background:#fff;border:1px solid var(--line);border-radius:18px;margin:10px 0;overflow:hidden}.tripBox summary{padding:12px 14px;background:var(--sun);font-weight:1000}.tripBody{padding:10px 12px}.step{background:#f7fdff;border:1px solid var(--line);border-radius:14px;padding:10px;margin:8px 0}.step b{display:block}.exit{background:#fff3c6;border-radius:10px;padding:8px;margin-top:6px;font-weight:900}.note{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;margin-top:10px;font-weight:850}.floatDock{position:fixed;left:10px;right:10px;bottom:10px;z-index:20;display:grid;grid-template-columns:repeat(4,1fr);gap:7px;max-width:720px;margin:auto}.dockBtn{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:18px;padding:8px 4px;text-align:center;text-decoration:none;color:var(--ink);font-weight:1000;box-shadow:0 10px 25px rgba(16,47,56,.16);font-size:12px}.dockBtn span{display:block;font-size:20px;line-height:1}@media(max-width:700px){.wrap{padding:10px 10px 105px}.navGrid{grid-template-columns:repeat(2,1fr)}.btn{width:100%}.floatDock{grid-template-columns:repeat(4,1fr)}.dockBtn{font-size:11px}.hero,.card,details{border-radius:22px}.day-title{font-size:21px}}</style></head><body id="top"><main class="wrap"><section class="hero"><span class="eyebrow">2026 關西親子自由行</span><h1 class="title">金童家關西旅程</h1><p class="subtitle">每日行程 × 快速導航 × 交通詳情整合版</p><div class="heroPhoto"><img src="https://github.com/sacha693/my-storyjs-app/blob/main/ChatGPT%20Image%202026%E5%B9%B45%E6%9C%889%E6%97%A5%20%E4%B8%8B%E5%8D%8809_28_18.png?raw=true" alt="金童家關西旅程封面圖"><div class="heroPhotoCaption">金童家關西旅程｜神戶・大阪・USJ・京都</div></div><div class="navGrid"><a class="navBtn primary" href="#days"><span class="ico">🗓️</span><span>每日行程<span class="mini">含導航與交通</span></span></a><a class="navBtn money" href="expense.html"><span class="ico">💰</span><span>旅費記帳<span class="mini">住宿已匯入</span></span></a><a class="navBtn" href="reminders.html"><span class="ico">⏰</span><span>出門提醒<span class="mini">行事曆提醒</span></span></a><a class="navBtn" href="usj.html"><span class="ico">🎢</span><span>USJ攻略<span class="mini">不排隊策略</span></span></a></div></section><h2 id="days" class="section-title">每日行程細節</h2><section id="app"></section></main><nav class="floatDock"><a class="dockBtn" href="#top"><span>🏠</span>首頁</a><a class="dockBtn" href="#days"><span>🗓️</span>行程</a><a class="dockBtn" href="expense.html"><span>💰</span>記帳</a><a class="dockBtn" href="reminders.html"><span>⏰</span>提醒</a></nav><script>if(location.search){history.replaceState(null,'',location.pathname+location.hash)}const map=q=>'https://www.google.com/maps?q='+encodeURIComponent(q);const days=[{d:'Day 0',date:'7/23',title:'台中 → 桃園機場過夜',sub:'前一天晚上出發，降低凌晨趕車壓力。',route:['台中火車站 → 客運 → 桃園機場 T2 → 5F 美食街外圍休息'],go:['台中火車站／台中轉運站 → 國光或統聯客運 → 桃園機場第二航廈。最近出口：抵達 T2 後依 5F 美食街指標。'],back:['無回程；抵達機場後以休息為主。'],buttons:[['🚌 台中火車站','台中火車站'],['✈ 桃園機場T2','桃園國際機場第二航廈']],note:'提早到站，確認護照、機票截圖、頸枕、外套與小孩零食。'},{d:'Day 1',date:'7/24',title:'神戶牛＋大阪天神祭宵宮',sub:'神戶進、大阪住，第一天不塞太滿。',route:['桃園 T2 → 神戶機場 → 三宮 → Mouriya 本店 → APA 天滿橋 → 天神祭宵宮'],go:['神戶機場站 → Port Liner → 三宮站。最近出口：往三宮站西側／北野坂方向，步行到 Mouriya 本店較順。','三宮站 → JR／阪神進大阪市區 → Osaka Metro 谷町線 → 天滿橋站。最近出口：天滿橋站 4 號出口較接近 APA 天滿橋方向。'],back:['APA 天滿橋 → 步行 → 天滿橋大川河岸。最近方向：往大川河岸方向，避開橋中央。','天滿橋河岸 → 步行 → APA 天滿橋。回程建議沿河岸外側走。'],buttons:[['🛬 神戶機場','神戶機場'],['🚃 三宮站','三宮駅'],['🥩 Mouriya本店','Mouriya Honten Kobe'],['🏨 APA天滿橋','APA Hotel Osaka Temmabashi Ekimae'],['🎆 天神祭宵宮','天満橋 大川 大阪 天神祭']],note:'神戶牛吃完先到大阪休息，晚上只感受祭典氣氛。'}];function list(arr){return arr.map((t,i)=>`<div class="step"><b>${i+1}. ${t.split('。')[0]}</b><div class="exit">${t.split('。').slice(1).join('。')}</div></div>`).join('')}function render(){app.innerHTML=days.map((d,i)=>`<details open><summary><div class="day-title">${d.d}｜${d.date}｜${d.title}</div><div class="day-sub">${d.sub}</div></summary><div class="content"><div class="route">${d.route.map(r=>'→ '+r).join('<br>')}</div><div class="blockTitle">📍 快速導航</div><div class="quickBtns">${d.buttons.map(b=>`<a class="btn" target="_blank" href="${map(b[1])}">${b[0]}</a>`).join('')}</div><div class="blockTitle">🚃 交通詳情</div><details class="tripBox" open><summary>去程交通｜站名・路線名・最近出口</summary><div class="tripBody">${list(d.go)}</div></details><details class="tripBox"><summary>回程交通｜站名・路線名・最近出口</summary><div class="tripBody">${list(d.back)}</div></details><div class="note">${d.note}</div></div></details>`).join('')}render();</script></body></html>
