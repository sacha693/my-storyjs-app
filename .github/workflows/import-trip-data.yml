name: Import Trip Data to Supabase

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  import-trip-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate private trip data SQL
        run: npm run recover:trip-data-sql

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Import trip data to Supabase
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          test -n "$SUPABASE_DB_URL"
          psql "$SUPABASE_DB_URL" --set=ON_ERROR_STOP=1 --file private/trip-data-documents.sql
