<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>今天行程｜一家四口日本關西旅程</title>
<style>
:root{--ink:#12323a;--line:#12323a;--blue:#7fd3df;--pale:#f7fdff;--soft:#e7fbff}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:linear-gradient(#bdeef5,#f7fdff);color:var(--ink);line-height:1.65}.wrap{max-width:900px;margin:auto;padding:16px}.top{background:var(--pale);border:4px solid var(--line);border-radius:20px;padding:18px;box-shadow:5px 5px 0 rgba(18,50,58,.22);margin:12px 0}.tabs{display:flex;gap:8px;overflow:auto;padding:8px 0}.tab{white-space:nowrap;border:3px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-weight:900;box-shadow:3px 3px 0 var(--line)}.tab.active{background:var(--blue)}.card{background:var(--pale);border:4px solid var(--line);border-radius:18px;padding:16px;box-shadow:5px 5px 0 rgba(18,50,58,.22);margin:14px 0}.time{font-weight:900;font-size:18px}.item{border-top:2px dashed var(--line);padding:12px 0}.item:first-child{border-top:0}.btn{display:inline-block;border:3px solid var(--line);background:var(--blue);color:var(--ink);text-decoration:none;padding:10px 13px;border-radius:13px;font-weight:900;box-shadow:3px 3px 0 var(--line);margin:5px 4px 5px 0}.btn.secondary{background:#fff}.note{background:var(--soft);border:3px dashed var(--line);border-radius:14px;padding:12px;margin-top:10px}h1{margin:0 0 6px}h2{margin:8px 0 4px}.small{font-size:14px;opacity:.85}@media(max-width:600px){.wrap{padding:12px}.btn{width:100%;text-align:center}.tab{font-size:14px}}</style>
</head>
<body>
<main class="wrap">
<section class="top">
<h1>今天行程</h1>
<p class="small">選擇日期後，只顯示當天真正需要的動線與導航按鈕。</p>
<a class="btn secondary" href="index.html">完整行程</a><a class="btn secondary" href="reminders.html">出門提醒</a>
<div id="tabs" class="tabs"></div>
</section>
<section id="content"></section>
</main>
<script>
const map=q=>'https://www.google.com/maps?q='+encodeURIComponent(q);
const days=[
{d:'Day 1',date:'7/24',title:'神戶牛＋天神祭宵宮',leave:'04:20 機場報到 / 11:00 神戶機場出發',items:[['04:20','桃園機場 T2 報到','06:20 起飛。','桃園國際機場第二航廈'],['10:00','抵達神戶機場','出關後前往三宮。','神戶機場'],['12:30','Mouriya 本店神戶牛午餐','建議已訂位或提前確認。','Mouriya Honten Kobe'],['15:30','APA 天滿橋入住休息','晚上輕鬆看天神祭宵宮。','APA Hotel Osaka Temmabashi Ekimae']],note:'第一天重點是不要硬撐，晚上的祭典看氣氛即可。'},
{d:'Day 2',date:'7/25',title:'童書之森＋天神祭本宮',leave:'09:10 出門 / 17:30 出門看祭典',items:[['09:30','童書之森 中之島','安藤忠雄設計，室內療癒行程。','こども本の森 中之島'],['11:30','北浜午餐','咖啡、簡餐，別吃太撐。','北浜 カフェ 大阪'],['13:30','回飯店午休','晚上人潮多，這段很重要。','APA Hotel Osaka Temmabashi Ekimae'],['17:30','天神祭觀賞點','走到天滿橋南側河岸，累了直接回飯店。','34.6923,135.5200']],note:'親子版策略：不擠橋中央，找河岸邊可撤退的位置。'},
{d:'Day 3',date:'7/26',title:'海遊館主軸',leave:'09:30 退房出門',items:[['09:30','退房前往海遊館','以海遊館為主，行李依現場寄放調整。','Osaka Aquarium Kaiyukan'],['10:30','大阪海遊館','鯨鯊大水槽、水母區、觸摸區。','Osaka Aquarium Kaiyukan'],['13:30','天保山 Market Place 午餐','海遊館旁邊解決最省力。','Tempozan Marketplace'],['15:30','Liber Hotel Osaka 入住休息','洗澡休息，為隔天 USJ 存體力。','Liber Hotel Osaka']],note:'這天不要加太多點，重點是海遊館＋恢復體力。'},
{d:'Day 4',date:'7/27',title:'USJ',leave:'07:20 出門到 USJ 門口',items:[['07:30','抵達 USJ 門口','可能提早開園。','Universal Studios Japan'],['早上','任天堂世界','馬力歐賽車 → 耀西。','Super Nintendo World USJ'],['下午','小小兵＋親子設施','中午避開熱門排隊。','Minion Park USJ'],['傍晚','哈利波特區','城堡拍照、奶油啤酒。','Wizarding World of Harry Potter USJ']],note:'排隊超過40分鐘就考慮放棄；每2小時休息一次。'},
{d:'Day 5',date:'7/28',title:'換飯店＋心齋橋購物',leave:'10:30 退房移動',items:[['10:30','移動到 OASIS NANIWA','寄放行李或入住。','OASIS NANIWA Osaka'],['12:00','難波午餐','一蘭或やよい軒擇一。','Yayoiken Namba'],['14:00','シモジマ 心齋橋店','文具與包裝材料。','Shimojima Shinsaibashi'],['18:30','道頓堀晚餐','大阪燒或章魚燒。','Mizuno Okonomiyaki Osaka']],note:'USJ隔天是恢復日，購物與咖啡休息要保留。'},
{d:'Day 6',date:'7/29',title:'京都 teamLab',leave:'10:00 出發前往京都',items:[['11:30','京都拉麵小路午餐','京都車站內最方便。','Kyoto Ramen Street'],['13:30','teamLab Biovortex Kyoto','沉浸式光影展，主行程。','teamLab Biovortex Kyoto'],['16:00','鴨川或祇園二選一','不要貪多，保留體力。','Kamo River Kyoto'],['18:30','回大阪','晚餐可回大阪再吃。','OASIS NANIWA Osaka']],note:'京都日一主一副即可：teamLab＋鴨川/祇園。'},
{d:'Day 7',date:'7/31',title:'回程日',leave:'08:00 出發前往關西機場',items:[['08:00','飯店出發','前往難波站搭南海電鐵。','Namba Station'],['09:00','抵達關西機場 T1','早餐、補買伴手禮。','Kansai International Airport Terminal 1'],['11:10','長榮 BR177 起飛','13:05 抵達桃園。','Kansai International Airport Terminal 1']],note:'最後一天不要排景點，準時到機場比多玩一點重要。'}
];
function render(i){tabs.innerHTML=days.map((x,idx)=>`<button class="tab ${idx===i?'active':''}" onclick="render(${idx})">${x.d}<br>${x.date}</button>`).join('');let d=days[i];content.innerHTML=`<div class="card"><h2>${d.d}｜${d.title}</h2><p><b>建議出門：</b>${d.leave}</p>${d.items.map(it=>`<div class="item"><div class="time">${it[0]}｜${it[1]}</div><div>${it[2]}</div><a class="btn" target="_blank" href="${map(it[3])}">導航</a></div>`).join('')}<div class="note">${d.note}</div></div>`}
render(0);
</script>
</body></html>
