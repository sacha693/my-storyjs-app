<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>每日快速操作｜一家四口日本關西旅程</title>
<style>
:root{--ink:#12323a;--line:#12323a;--blue:#7fd3df;--pale:#f7fdff;--soft:#e7fbff;--yellow:#f4c95d}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:linear-gradient(#bdeef5,#f7fdff);color:var(--ink);line-height:1.6}.wrap{max-width:980px;margin:auto;padding:14px}.top,.card{background:var(--pale);border:4px solid var(--line);border-radius:20px;padding:16px;box-shadow:5px 5px 0 rgba(18,50,58,.22);margin:14px 0}.nav{display:flex;gap:8px;overflow:auto;padding:8px 0}.tab{white-space:nowrap;border:3px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;font-weight:900;box-shadow:3px 3px 0 var(--line)}.tab.active{background:var(--blue)}.day-title{font-size:26px;font-weight:900;margin:0 0 4px}.leave{background:var(--soft);border:3px dashed var(--line);border-radius:14px;padding:10px;margin:10px 0;font-weight:900}.section{border-top:2px dashed var(--line);padding:12px 0}.section:first-of-type{border-top:0}.time{font-size:18px;font-weight:900}.btn{display:inline-block;border:3px solid var(--line);background:var(--blue);color:var(--ink);text-decoration:none;padding:10px 13px;border-radius:13px;font-weight:900;box-shadow:3px 3px 0 var(--line);margin:5px 4px 5px 0}.btn.alt{background:#fff}.btn.warn{background:var(--yellow)}.route{font-weight:800}.note{background:#fff;border:3px solid var(--line);border-radius:14px;padding:10px;margin-top:10px}.small{font-size:14px;opacity:.85}.home{display:flex;gap:8px;flex-wrap:wrap}@media(max-width:650px){.wrap{padding:10px}.btn{width:100%;text-align:center}.day-title{font-size:22px}.tab{font-size:14px}}
</style>
</head>
<body>
<main class="wrap">
<section class="top">
<h1>每日快速操作</h1>
<p class="small">完整 Day 1～Day 7。每一天只放現場會用到的導航、動線與提醒。</p>
<div class="home"><a class="btn alt" href="index.html">完整行程</a><a class="btn alt" href="today.html">今天模式</a><a class="btn alt" href="reminders.html">出門提醒</a></div>
<div id="tabs" class="nav"></div>
</section>
<section id="content"></section>
</main>
<script>
const map=q=>'https://www.google.com/maps?q='+encodeURIComponent(q);
const days=[
{d:'Day 1',date:'7/24',title:'出發・神戶牛・天神祭宵宮',leave:'前晚 21:00 客運；04:20 桃園機場 T2 報到',route:['台中火車站 → 桃園機場 T2','桃園 → 神戶機場','神戶機場 → 三宮 → Mouriya','三宮 → 大阪天滿橋 → 飯店'],buttons:[['✈ 桃園機場T2','桃園國際機場第二航廈'],['🛬 神戶機場','神戶機場'],['🚃 三宮站','三宮駅'],['🥩 Mouriya本店','Mouriya Honten Kobe'],['🏨 APA天滿橋','APA Hotel Osaka Temmabashi Ekimae'],['🎆 天神祭宵宮','天満橋 大川 大阪 天神祭']],note:'第一天不要硬撐。神戶牛吃完先到大阪休息，晚上只感受祭典氣氛。'},
{d:'Day 2',date:'7/25',title:'童書之森・北浜・天神祭本宮',leave:'09:10 出門去童書之森；17:30 出門看天神祭',route:['APA天滿橋 → 童書之森','童書之森 → 北浜午餐','北浜 → 飯店午休','飯店 → 天滿橋南側河岸'],buttons:[['🌿 童書之森','こども本の森 中之島'],['☕ 北浜咖啡午餐','北浜 カフェ 大阪'],['🏨 回APA飯店','APA Hotel Osaka Temmabashi Ekimae'],['🎆 親子觀賞點','34.6923,135.5200'],['📍 備用安靜點','34.6955,135.5305']],note:'親子版不擠橋中央。帶小風扇、水、濕紙巾，小孩累了直接回飯店。'},
{d:'Day 3',date:'7/26',title:'海遊館主軸・移動到USJ區',leave:'09:30 退房出門',route:['天滿橋/飯店 → 大阪港海遊館','海遊館 → 天保山 Market Place','大阪港 → Liber Hotel','晚餐可到 CityWalk'],buttons:[['🐠 大阪海遊館','Osaka Aquarium Kaiyukan'],['🍽 天保山午餐','Tempozan Marketplace'],['🏨 Liber Hotel','Liber Hotel Osaka'],['🍜 CityWalk晚餐','Universal CityWalk Osaka']],note:'這天只以海遊館為主。下午回飯店休息，為隔天 USJ 存體力。'},
{d:'Day 4',date:'7/27',title:'USJ',leave:'07:20 出門，07:30～08:00 到門口',route:['Liber Hotel → USJ入口','入園先任天堂世界','中午錯峰吃飯/休息','下午小小兵與親子設施','傍晚哈利波特'],buttons:[['🎢 USJ園區','Universal Studios Japan'],['🍄 任天堂世界','Super Nintendo World USJ'],['🎈 小小兵樂園','Minion Park USJ'],['🧙 哈利波特','Wizarding World of Harry Potter USJ'],['🍜 CityWalk','Universal CityWalk Osaka']],note:'熱門設施排超過40分鐘就考慮放棄。每2小時休息一次。小孩優先：耀西、小小兵、Snoopy/Kitty/芝麻街。'},
{d:'Day 5',date:'7/28',title:'換飯店・心齋橋文具購物',leave:'10:30 退房移動到市區',route:['Liber/USJ區 → OASIS NANIWA','難波午餐','心齋橋・シモジマ','咖啡休息','道頓堀晚餐'],buttons:[['🏨 OASIS NANIWA','OASIS NANIWA Osaka'],['🍜 一蘭道頓堀','Ichiran Dotonbori'],['🍱 やよい軒難波','Yayoiken Namba'],['✏ シモジマ','Shimojima Shinsaibashi'],['☕ % Arabica','Arabica Shinsaibashi'],['🥞 美津の大阪燒','Mizuno Okonomiyaki Osaka'],['🐙 章魚燒','Kukuru Dotonbori']],note:'USJ隔天是恢復日，購物要慢慢逛，咖啡休息不要省。'},
{d:'Day 6',date:'7/29',title:'京都 teamLab',leave:'10:00 出發前往京都',route:['大阪 → 京都車站','京都車站午餐','teamLab Biovortex Kyoto','鴨川或祇園二選一','回大阪'],buttons:[['🚉 京都車站','Kyoto Station'],['🍜 京都拉麵小路','Kyoto Ramen Street'],['✨ teamLab','teamLab Biovortex Kyoto'],['🌿 鴨川','Kamo River Kyoto'],['🏮 祇園','Gion Kyoto'],['🏨 回OASIS','OASIS NANIWA Osaka']],note:'京都日一主一副即可。teamLab 是主行程，鴨川/祇園二選一，不要貪多。'},
{d:'Day 7',date:'7/31',title:'回程日',leave:'08:00 出發前往關西機場',route:['飯店 → 難波站','南海電鐵 → 關西機場 T1','早餐/補買伴手禮','11:10 起飛回台灣'],buttons:[['🚆 難波站','Namba Station'],['✈ 關西機場T1','Kansai International Airport Terminal 1'],['🛍 機場伴手禮','Kansai International Airport Terminal 1 shops']],note:'最後一天不要排景點。09:00前到機場最穩。'}
];
function render(i){tabs.innerHTML=days.map((x,idx)=>`<button class="tab ${idx===i?'active':''}" onclick="render(${idx})">${x.d}<br>${x.date}</button>`).join('');const d=days[i];content.innerHTML=`<div class="card"><div class="day-title">${d.d}｜${d.title}</div><div class="leave">建議出門：${d.leave}</div><div class="section"><b>今日動線</b>${d.route.map(r=>`<p class="route">→ ${r}</p>`).join('')}</div><div class="section"><b>一鍵導航</b><br>${d.buttons.map(b=>`<a class="btn" target="_blank" href="${map(b[1])}">${b[0]}</a>`).join('')}</div><div class="note">${d.note}</div></div>`}
render(0);
</script>
</body></html>
