<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>每日快速操作｜金童家日本關西旅程</title>
    <style>:root{--ink:#12323a;--line:#12323a;--blue:#7fd3df;--pale:#f7fdff;--soft:#e7fbff;--yellow:#f4c95d;--mint:#d8f5ec}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:linear-gradient(#bdeef5,#f7fdff);color:var(--ink);line-height:1.6}.wrap{max-width:980px;margin:auto;padding:14px}.top,.card{background:var(--pale);border:4px solid var(--line);border-radius:20px;padding:16px;box-shadow:5px 5px 0 rgba(18,50,58,.22);margin:14px 0}.nav{display:flex;gap:8px;overflow:auto;padding:8px 0}.tab{white-space:nowrap;border:3px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;font-weight:900;box-shadow:3px 3px 0 var(--line)}.tab.active{background:var(--blue)}.day-title{font-size:26px;font-weight:900;margin:0 0 4px}.leave{background:var(--soft);border:3px dashed var(--line);border-radius:14px;padding:10px;margin:10px 0;font-weight:900}.section{border-top:2px dashed var(--line);padding:12px 0}.btn{display:inline-block;border:3px solid var(--line);background:var(--blue);color:var(--ink);text-decoration:none;padding:10px 13px;border-radius:13px;font-weight:900;box-shadow:3px 3px 0 var(--line);margin:5px 4px 5px 0}.btn.alt{background:#fff}.note{background:#fff;border:3px solid var(--line);border-radius:14px;padding:10px;margin-top:10px}.transit{background:#fff;border:3px solid var(--line);border-radius:14px;padding:10px;margin:8px 0}.transit b{display:block}.tripBox{background:#fff;border:3px solid var(--line);border-radius:16px;margin:10px 0;overflow:hidden}.tripBox summary{cursor:pointer;list-style:none;background:var(--yellow);padding:12px 14px;font-weight:1000}.tripBox summary::-webkit-details-marker{display:none}.tripBody{padding:10px 12px}.lineName{display:inline-block;background:var(--mint);border-radius:999px;padding:3px 8px;margin:2px;font-weight:900}.exit{background:#fff3c6;border-radius:10px;padding:8px;margin-top:6px;font-weight:900}small{font-size:14px;opacity:.85}.home{display:flex;gap:8px;flex-wrap:wrap}@media(max-width:650px){.wrap{padding:10px}.btn{width:100%;text-align:center}.day-title{font-size:22px}.tab{font-size:14px}}
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="top">
        <h1>每日快速操作</h1>
        <p class="small">金童家日本關西旅程。每一天只放現場會用到的導航、動線、交通站名、路線名稱與最近出口提醒。</p>
        <div class="home">
          <a class="btn alt" href="index.html">回主頁</a>
          <a class="btn alt" href="today.html">今天模式</a>
          <a class="btn alt" href="reminders.html">出門提醒</a>
          <a class="btn alt" href="transit-detail.html">交通詳情</a>
        </div>
        <div id="tabs" class="nav"> </div>
      </section>
      <section id="content"> </section>
    </main>
    <script>const map=q=>'https://www.google.com/maps?q='+encodeURIComponent(q);
      const days=[{d:'Day 1',date:'7/24',title:'出發・神戶牛・天神祭宵宮',leave:'前晚 21:00 客運；04:20 桃園機場 T2 報到',route:['台中火車站 → 桃園機場 T2','桃園 → 神戶機場','神戶機場 → 三宮 → Mouriya','三宮 → 大阪天滿橋 → 飯店'],go:['台中火車站／台中轉運站 → 國光或統聯客運 → 桃園機場第二航廈。最近出口：抵達 T2 後依 5F 美食街指標。','神戶機場站 → Port Liner → 三宮站。最近出口：往三宮站西側／北野坂方向，步行到 Mouriya 本店較順。','三宮站 → JR／阪神進大阪市區 → Osaka Metro 谷町線 → 天滿橋站。最近出口：天滿橋站 4 號出口較接近 APA 天滿橋方向。'],back:['APA 天滿橋 → 步行 → 天滿橋大川河岸。最近出口：往大川河岸方向，避開橋中央人潮。','天滿橋大川河岸 → 步行 → APA 天滿橋。回程建議沿河岸外側走，保留撤退路線。'],buttons:[['✈ 桃園機場T2','桃園國際機場第二航廈'],['🛬 神戶機場','神戶機場'],['🚃 三宮站','三宮駅'],['🥩 Mouriya本店','Mouriya Honten Kobe'],['🏨 APA天滿橋','APA Hotel Osaka Temmabashi Ekimae'],['🎆 天神祭宵宮','天満橋 大川 大阪 天神祭']],note:'第一天不要硬撐。神戶牛吃完先到大阪休息，晚上只感受祭典氣氛。'},
      {d:'Day 2',date:'7/25',title:'童書之森・北浜・天神祭本宮',leave:'09:10 出門去童書之森；17:30 出門看天神祭',route:['APA天滿橋 → 童書之森','童書之森 → 北浜午餐','北浜 → 飯店午休','飯店 → 天滿橋南側河岸'],go:['天滿橋站 → 京阪中之島線／步行銜接 → なにわ橋站。最近出口：なにわ橋站 1 號出口，往中之島公園與童書之森。','童書之森中之島 → 步行 → 北浜咖啡區。最近方向：往北浜站、土佐堀川河岸咖啡區。','APA 天滿橋 → 步行 → 天滿橋南側河岸。最近方向：大川河岸方向出口。'],back:['北浜 → 京阪／步行 → APA 天滿橋。最近出口：天滿橋站 4 號出口或依飯店地圖。','天滿橋河岸 → 步行 → APA 天滿橋。回程建議沿南側河岸外圍回飯店。'],buttons:[['🌿 童書之森','こども本の森 中之島'],['☕ 北浜咖啡午餐','北浜 カフェ 大阪'],['🏨 回APA飯店','APA Hotel Osaka Temmabashi Ekimae'],['🎆 親子觀賞點','34.6923,135.5200']],note:'親子版不擠橋中央。帶小風扇、水、濕紙巾，小孩累了直接回飯店。'},
      {d:'Day 3',date:'7/26',title:'海遊館主軸・移動到USJ區',leave:'09:30 退房出門',route:['天滿橋/飯店 → 大阪港海遊館','海遊館 → 天保山 Market Place','大阪港 → Liber Hotel','晚餐可到 CityWalk'],go:['天滿橋站 → Osaka Metro 谷町線轉中央線 → 大阪港站。最近出口：大阪港站 1 號出口，最接近海遊館與天保山 Market Place。','大阪港站 → 中央線／JR 轉乘 → 櫻島站。最近出口：櫻島站出站後依 Liber Hotel 指標步行。'],back:['Liber Hotel → JR 櫻島線或步行 → Universal CityWalk。最近方向：環球城站出站穿過 CityWalk。','Universal CityWalk → 步行／JR → Liber Hotel。晚餐後直接回飯店。'],buttons:[['🐠 大阪海遊館','Osaka Aquarium Kaiyukan'],['🍽 天保山午餐','Tempozan Marketplace'],['🏨 Liber Hotel','Liber Hotel Osaka'],['🍜 CityWalk晚餐','Universal CityWalk Osaka']],note:'這天只以海遊館為主。下午回飯店休息，為隔天 USJ 存體力。'},
      {d:'Day 4',date:'7/27',title:'USJ',leave:'07:20 出門，07:30～08:00 到門口',route:['Liber Hotel → USJ入口','入園先任天堂世界','中午錯峰吃飯/休息','下午小小兵與親子設施','傍晚哈利波特'],go:['Liber Hotel → 步行或 JR 櫻島線 → 環球城站／USJ入口。最近出口：環球城站出站後穿過 Universal CityWalk，跟著 USJ 入口指標。','USJ入口 → 園區步行 → 任天堂世界／哈利波特區。最快方向：入園後不要先逛商店。'],back:['USJ入口 → 步行或 JR 櫻島線 → Liber Hotel。最近方向：出園後穿過 CityWalk，避開商店街停留。'],buttons:[['🎢 USJ園區','Universal Studios Japan'],['🍄 任天堂世界','Super Nintendo World USJ'],['🎈 小小兵樂園','Minion Park USJ'],['🧙 哈利波特','Wizarding World of Harry Potter USJ'],['🍜 CityWalk','Universal CityWalk Osaka']],note:'熱門設施排超過40分鐘就考慮放棄。每2小時休息一次。'},
      {d:'Day 5',date:'7/28', title:'換飯店・心齋橋文具購物',leave:'10:30 退房移動到市區',route:['Liber/USJ區 → OASIS NANIWA','難波午餐','心齋橋・シモジマ','咖啡休息','道頓堀晚餐'],go:['櫻島站／環球城站 → JR 櫻島線 → 西九條站 → 阪神難波線 → 大阪難波站。最近出口：往 OASIS NANIWA 依地圖出口；難波商圈可用 14、15-B 方向。','大阪難波／難波站 → Osaka Metro 御堂筋線 → 心齋橋站。最近出口：心齋橋站 5、6 號出口往心齋橋筋與シモジマ方向。','心齋橋 → 步行 → 道頓堀。最近方向：難波站 14、15-B 方向。'],back:['道頓堀 → 步行／Metro → OASIS NANIWA。人潮多時走外圍道路，不要穿越最擠的戎橋。'],buttons:[['🏨 OASIS NANIWA','OASIS NANIWA Osaka'],['✏ シモジマ','Shimojima Shinsaibashi'],['🥞 美津の大阪燒','Mizuno Okonomiyaki Osaka']],note:'USJ隔天是恢復日，購物要慢慢逛，咖啡休息不要省。'},
      {d:'Day 6',date:'7/29',title:'京都 teamLab',leave:'10:00 出發前往京都',route:['大阪 → 京都車站','京都車站午餐','teamLab Biovortex Kyoto 1:00','鴨川或祇園二選一','回大阪'],go:['大阪站 → JR 京都線 → 京都站。最近出口：京都站中央口適合車站用餐；前往 teamLab 建議八條東口／東南側方向。','京都站 → 步行或短程計程車 → teamLab Biovortex Kyoto。最近出口：京都站八條東口。','京都站／teamLab → 公車／計程車／京阪線 → 祇園四条站／鴨川。最近出口：祇園四条站 6、7 號出口往祇園與鴨川。'],back:['祇園四条／京都站 → JR 京都線或阪急／京阪 → 大阪站／難波。最近方向：京都站回程依 JR 中央口；人多時用計程車回京都站較省力。'],buttons:[['🚉 京都車站','Kyoto Station'],['🍜 京都拉麵小路','Kyoto Ramen Street'],['✨ teamLab','teamLab Biovortex Kyoto'],['🌿 鴨川','Kamo River Kyoto'],['🏨 回OASIS','OASIS NANIWA Osaka']],note:'京都日一主一副即可。teamLab 入場時間 1:00，鴨川/祇園二選一，不要貪多。'},
      {d:'Day 7',date:'7/30',title:'自由購物・補買日',leave:'睡晚一點，保留彈性',route:['OASIS → Joshin Super Kids Land','黑門市場/難波補買','飯店整理行李'],go:['OASIS NANIWA → 步行或 Osaka Metro → 日本橋站／黑門市場。最近出口：日本橋站 10 號出口方向。','難波站 → 步行 → Joshin Super Kids Land。最近出口：難波站往南海難波／日本橋／電電城方向出口。'],back:['黑門市場／日本橋 → 步行或 Metro → OASIS NANIWA。採買後先回住宿放東西。'],buttons:[['🧸 Joshin Super Kids Land','Joshin Super Kids Land Osaka'],['🛍 黑門市場','Kuromon Market'],['🏨 回OASIS','OASIS NANIWA Osaka']],note:'購物與整理日，不要排太滿。'},
      {d:'Day 8',date:'7/31',title:'回程日',leave:'08:00 出發前往關西機場',route:['飯店 → 難波站','南海電鐵 → 關西機場 T1','11:10 起飛回台灣'],go:['OASIS NANIWA → 步行／地下鐵銜接 → 南海難波站。最近出口／方向：往南海難波站 3F 改札口。','南海難波站 → 南海電鐵 Rapi:t／空港急行 → 關西機場站。最近出口：出閘後依 Terminal 1／國際線出發指標。'],back:['關西機場 T1 → 長榮航空 BR177 → 桃園機場 T2。抵台後依入境／行李轉盤指標。'],buttons:[['🚆 難波站','Namba Station'],['✈ 關西機場T1','Kansai International Airport Terminal 1']],note:'最後一天不要排景點。09:00前到機場最穩。'}];
      function list(arr){return arr.map((t,i)=>`<div class="transit"><b>${i+1}. ${t.split('。')[0]}</b><div class="exit">${t.split('。').slice(1).join('。')}</div></div>`).join('')}
      function render(i){tabs.innerHTML=days.map((x,idx)=>`<button class="tab ${idx===i?'active':''}" onclick="render(${idx})">${x.d}<br>${x.date}</button>`).join('');const d=days[i];content.innerHTML=`<div class="card"><div class="day-title">${d.d}｜${d.title}</div><div class="leave">建議出門：${d.leave}</div><div class="section"><b>今日動線</b>${d.route.map(r=>`<p>→ ${r}</p>`).join('')}</div><div class="section"><b>🚃 可展開交通：去程／回程</b><details class="tripBox" open><summary>去程交通｜站名・路線名・最近出口</summary><div class="tripBody">${list(d.go)}</div></details><details class="tripBox"><summary>回程交通｜站名・路線名・最近出口</summary><div class="tripBody">${list(d.back)}</div></details></div><div class="section"><b>一鍵導航</b><br>${d.buttons.map(b=>`<a class="btn" target="_blank" href="${map(b[1])}">${b[0]}</a>`).join('')}</div><div class="note">${d.note}</div></div>`}render(0);</script></body></html>
