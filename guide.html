<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>導遊語音介紹｜金童家日本關西旅程</title><style>:root{--ink:#12323a;--line:#12323a;--blue:#7fd3df;--soft:#e7fbff;--card:#f7fdff;--yellow:#f4c95d}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:linear-gradient(#bdeef5,#f7fdff);color:var(--ink);line-height:1.7}.wrap{max-width:960px;margin:auto;padding:14px 14px 90px}.card{background:var(--card);border:4px solid var(--line);border-radius:20px;padding:16px;margin:14px 0;box-shadow:5px 5px 0 rgba(18,50,58,.22)}h1,h2,h3{line-height:1.2}.btn{display:inline-block;border:3px solid var(--line);background:var(--blue);color:var(--ink);text-decoration:none;padding:10px 13px;border-radius:13px;font-weight:900;box-shadow:3px 3px 0 var(--line);margin:5px 4px 5px 0;cursor:pointer}.btn.alt{background:#fff}.btn.warn{background:var(--yellow)}.spot{border-top:2px dashed var(--line);padding:14px 0}.spot:first-of-type{border-top:0}.script{background:var(--soft);border:3px dashed var(--line);border-radius:14px;padding:12px;margin-top:8px}.tag{display:inline-block;background:#fff;border:2px solid var(--line);border-radius:999px;padding:3px 8px;margin:2px;font-weight:900}.float{position:fixed;right:12px;z-index:9999;border:3px solid var(--line);border-radius:999px;padding:12px 14px;font-weight:900;text-decoration:none;color:var(--ink);box-shadow:3px 3px 0 var(--line)}.home{bottom:192px;background:#fff}.quick{bottom:132px;background:var(--blue)}.today{bottom:72px;background:var(--yellow)}.top{bottom:12px;background:#fff}@media(max-width:650px){.btn{width:100%;text-align:center}.wrap{padding:10px 10px 90px}.float{right:8px;padding:10px 12px}}</style></head><body id="top"><a class="float home" href="main.html?v=20">🏠 主頁</a><a class="float quick" href="quick.html">📍 快速</a><a class="float today" href="today.html">📅 今天</a><a class="float top" href="#top">⬆️</a><main class="wrap"><section class="card"><h1>🎧 景點導遊語音介紹</h1><p>點選每個景點的「播放國語導覽」，手機會用國語朗讀導遊介紹。若沒有聲音，請確認手機沒有靜音，並使用 Safari / Chrome 開啟。</p><p><a class="btn alt" href="main.html?v=20">完整行程</a><a class="btn alt" href="quick.html">快速操作</a><a class="btn alt" href="today.html">今天模式</a><a class="btn alt" href="usj.html?v=12">USJ攻略</a></p><div><span class="tag">金童家</span><span class="tag">國語語音</span><span class="tag">好拍照</span><span class="tag">不累導覽</span></div></section><section class="card" id="guideList"></section></main><script>const spots=[{d:'Day 1',name:'神戶機場',map:'神戶機場',text:'現在我們抵達的是神戶機場。這座機場規模不大，但動線清楚、出關相對輕鬆，很適合作為關西自由行的入口。接下來搭乘 Port Liner 前往三宮，沿途可以看到神戶港灣城市的感覺，今天的重點是輕鬆進入日本，不要把第一天排太滿。'},{d:'Day 1',name:'Mouriya 本店 神戶牛',map:'Mouriya Honten Kobe',text:'這裡是神戶知名的牛排餐廳 Mouriya 本店。神戶牛的特色是油花細緻、入口柔軟，適合慢慢品嘗。今天建議把這餐當作重點體驗，吃完後不要再排太多神戶景點，直接移動到大阪休息，會是最舒服的安排。'},{d:'Day 4',name:'日本環球影城 USJ',map:'Universal Studios Japan',text:'今天是環球影城日，策略是早上先衝熱門區，中午拍照吃飯，下午安排表演與輕鬆設施。不要用全破心態玩 USJ，親子旅行最重要的是保留體力。排隊超過四十分鐘，可以先跳過，改拍照或休息。'},{d:'Day 6',name:'teamLab Biovortex Kyoto',map:'teamLab Biovortex Kyoto',text:'teamLab Biovortex Kyoto 是這天的主行程，入場時間是一點。特色是沉浸式光影、互動藝術與流動的視覺空間。這裡很適合拍照，但也建議留一點時間只是感受作品，不要全程只忙著拍。親子參觀時，提醒孩子慢慢走、不要奔跑。'}];function speak(t){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='zh-TW';u.rate=.92;u.pitch=1;speechSynthesis.speak(u)}function stopSpeak(){speechSynthesis.cancel()}function map(q){return 'https://www.google.com/maps?q='+encodeURIComponent(q)}guideList.innerHTML='<h2>景點導遊介紹</h2>'+spots.map((s,i)=>`<div class="spot"><h3>${s.d}｜${s.name}</h3><p><a class="btn" target="_blank" href="${map(s.map)}">📍 地圖導航</a><button class="btn warn" onclick="speak(spots[${i}].text)">▶ 播放國語導覽</button><button class="btn alt" onclick="stopSpeak()">■ 停止</button></p><div class="script">${s.text}</div></div>`).join('');</script></body></html>
